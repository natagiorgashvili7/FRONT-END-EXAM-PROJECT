<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- mobile version library's header -->
    <header class="library_mob_header">
        <input type="text" placeholder="Search Library">
        <a><img src="assets/images/header/search.png" alt="search"></a>
        <a><img src="assets/images/library/plus.png"></a>
    </header>

    <main class="library_mob_main">
        <section class="filter">
            <div class="menu">
                <img src="assets/images/library/menu.png" alt="menu">
                <p>Group</p>
            </div>
            <div class="menu">
                <img src="assets/images/library/recents.png" alt="recents">
                <p>recents</p>
            </div>
        </section>
        <section class="library_list">
            <div class="library_item">
            <p>Playlists</p>
            <img src="assets/images/library/arrow.png">
            </div>
            <div class="library_item">
            <p>Playlists by Spotify</p>
            <img src="assets/images/library/arrow.png">
            </div>
            <div class="library_item">
            <p>Albums</p>
            <img src="assets/images/library/arrow.png">
            </div>
            <div class="library_item">
            <p>Folders</p>
            <img src="assets/images/library/arrow.png">
            </div>
            <div class="library_item">
            <p>Artists</p>
            <img src="assets/images/library/arrow.png">
            </div>

            </section>
    </main>

    <footer class="player">
        <!-- controls -->
            <section class="player-controle">
                <div class="controls">
                    <img src="assets/images/footer/pause.png" alt="pause">
                    <img src="assets/images/footer/left.png" alt="left">
                    <img src="assets/images/footer/right.png" alt="right">
                    <img src="assets/images/footer/switch.png" alt="switch">
                    <img src="assets/images/footer/reply.png" alt=reply>
                </div>
                <div class="progress-section">
                    <span>2:23</span>

                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>

                    <span>4:45</span>
                </div>
            </section>
            <section class="music_and_buttons">
                <!-- Track info -->
                <section class="music">
                    <div class="music_info">
                        <img src="assets/images/footer/song.png" alt="album cover">
                        <div class="track-info">
                            <p class="track-title">Get Lucky</p>
                            <p class="artist">Daft Punk</p>
                            <p class="band">Random Access Memories</p>
                        </div>
                    </div>
                    
                    <div class="track-actions">
                        <img src="assets/images/footer/like.png" alt="like">
                        <img src="assets/images/footer/add.png" alt="add">
                        <img src="assets/images/footer/lyrics.png" alt="playlist">
                        <img src="assets/images/footer/queue.png" alt="queue">
                    </div>
                </section>


                <!-- actions -->
                <section class="player-right">

                    <img src="assets/images/footer/DJ.png" alt="dj">
                    <img src="assets/images/footer/pc-queue.png" alt="pc-queue">

                </section>
                <section class="mobile_icon">
                    <img src="assets/images/footer/mob2.png" alt="add">
                    <img src="assets/images/footer/mob1.png" alt="like">
                </section>

                <section class="footer_nav">
                    <a href="index.html"><img src="assets/images/footer/home.png" alt="home"></a>
                    <a href="#discover"><img src="assets/images/footer/discover.png" alt="discover"></a>
                    <a><img src="assets/images/footer/search.png" alt="search"></a>
                    <a href="mobile_library.html"><img src="assets/images/footer/library.png" alt="library"></a>
                    <a><img src="assets/images/footer/me.png" alt="me"></a>
                    
                </section>
            </section>

            </footer>  
</body>
</html>
