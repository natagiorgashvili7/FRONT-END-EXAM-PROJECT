<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <section class="main_structure">
            <!-- aside section -->
        <aside class="side-nav">
            <!-- side navigation -->
            <nav class="aside_nav">
                <ul class="aside_nav_items">
                    <li class="main_pages">
                        <div class="each_page">
                            <img src="assets/images/aside/library.png" alt="library icon">
                            <a href="#">My Library</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/pin.png" alt="pin icon">
                            <a href="#">Pins</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/albums.png" alt="playlist icon">
                            <a href="#">Playlists</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/like.png" alt="like icon">
                            <a href="#">Liked songs</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/save.png" alt="save icon">
                            <a href="#">Saves</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/albums.png" alt="album icon">
                            <a href="#">Albums</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/folder.png" alt="folder icon">
                            <a href="#">Folders</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/podcast.png" alt="podcast icon">
                            <a href="#">Podcasts</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/audiobook.png" alt="audiobook icon">
                            <a href="#">Audiobooks</a>
                        </div>
                        <div class="each_page">
                            <img src="assets/images/aside/artist.png" alt="artist icon">
                            <a href="#">Artists</a>
                        </div>

                    </li>
                </ul>
            </nav>


        </aside>

        <!-- header -->
        <header class="header">
            <nav class="nav_section">
                <!-- header's main navigation -->
                <section class="main_section">
                    <div class="home">
                        <img class="header_btn" src="assets/images/header/home.png" alt="home logo">
                        <a href="index.html">Home</a>
                    </div>
                    <div class="discover">
                        <img class="header_btn" src="assets/images/header/discover.png" alt="discover logo">
                        <a href="#">Discover</a>
                    </div>
                    <div class="search">
                        <img class="header_btn" src="assets/images/header/search.png" alt="discover logo">
                        <a href="#">Search</a>
                    </div>
                </section>
            </nav>

            <!-- action buttons -->
            <section class="actions">
                <button><img src="assets/images/header/notification.png" alt="notification icon"></button>
                <button><img src="assets/images/header/lock.png" alt="lock icon"></button>
                <button><img src="assets/images/header/friends.png" alt="friend icon"></button>
                <button><img src="assets/images/header/settings.png" alt="settings icon"></button>
                <img class="profile" src="assets/images/header/profile.png" alt="profile picture">
            </section>

        </header>
    </section>
    
    
</body>
</html>
